<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loot Campaign - Create</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --p: #6a2195; }
        body { background: var(--p); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; max-width: 400px; margin: auto; text-align: center; }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid var(--p); border-radius: 10px; }
        button { background: var(--p); color: white; border: none; padding: 12px; width: 100%; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #linkBox { margin-top: 15px; color: var(--p); word-wrap: break-word; font-weight: bold; padding: 10px; border: 1px dashed var(--p); display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--p)">Loot Campaign</h2>
        <select id="offer">
            <option value="AngelOne">AngelOne (Rs.175)</option>
            <option value="Upstox">Upstox (Rs.200)</option>
        </select>
        <input type="text" id="upi" placeholder="अपनी UPI ID डालें (e.g. name@ybl)">
        <button onclick="gen()">Generate Link</button>
        <div id="linkBox"></div>
    </div>

    <script>
        const firebaseConfig = { 
            // PASTE_CONFIG_HERE
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function gen() {
            const upi = document.getElementById('upi').value;
            if(!upi.includes('@')) return alert("सही UPI डालें");
            
            const doc = await db.collection("users").add({
                upi: upi,
                offer: document.getElementById('offer').value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            const url = window.location.origin + "/task.html?ref=" + doc.id;
            document.getElementById('linkBox').style.display = "block";
            document.getElementById('linkBox').innerText = "आपका लिंक: " + url;
        }
    </script>
</body>
</html>
