<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Task</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f3ebf7; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn { background: #6a2195; color: white; padding: 12px; border: none; width: 100%; border-radius: 8px; margin: 10px 0; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>टास्क पूरा करें और कैशबैक पाएं</h3>
        <input type="text" id="u_upi" placeholder="अपनी UPI ID यहाँ भरें" style="width:90%; padding:10px; margin-bottom:10px;">
        <button class="btn" style="background:green" onclick="window.open('YOUR_OFFER_LINK_HERE')">Start KYC Now</button>
        <hr>
        <p>KYC/Trade के बाद स्क्रीनशॉट अपलोड करें</p>
        <input type="file" id="img" accept="image/*">
        <button class="btn" onclick="submit()">Submit Proof</button>
    </div>

    <script>
        const firebaseConfig = { 
            // PASTE_CONFIG_HERE
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const st = firebase.storage();

        const ref = new URLSearchParams(window.location.search).get('ref');

        async function submit() {
            const upi = document.getElementById('u_upi').value;
            const file = document.getElementById('img').files[0];
            if(!upi || !file) return alert("सब जानकारी भरें");

            const sRef = st.ref('proofs/' + Date.now());
            await sRef.put(file);
            const url = await sRef.getDownloadURL();

            await db.collection("leads").add({
                refId: ref,
                userUpi: upi,
                img: url,
                status: "Pending",
                time: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("प्रूफ सबमिट हो गया!");
        }
    </script>
</body>
</html>
